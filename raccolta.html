<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Archivio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .comic-card { transition: all 0.3s ease; background: #111827; border: 1px solid #1e293b; height: 100%; }
        .comic-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-7xl mx-auto mb-10">
        <a href="index.html" class="text-sky-500 hover:text-sky-400 font-bold tracking-widest text-xs uppercase transition-colors">← Torna alla Home</a>
        <h1 id="titolo-serie" class="serif-title text-5xl md:text-6xl text-white mt-4 italic">Archivio</h1>
    </header>

    <main id="lista-fumetti" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
        <div class="col-span-full text-center py-20 text-slate-500 serif-title text-2xl animate-pulse">
            Caricamento dati dal database...
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv";

        async function caricaDati() {
            const params = new URLSearchParams(window.location.search);
            const serieTarget = params.get('serie'); // es: dyd
            
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // Pulizia righe
                const righe = text.split(/\r?\n/).filter(r => r.trim() !== "");
                const container = document.getElementById('lista-fumetti');
                container.innerHTML = "";

                let contatore = 0;

                // Partiamo da 1 per saltare l'intestazione
                for (let i = 1; i < righe.length; i++) {
                    // Questa regex gestisce correttamente le virgole dentro i campi tra virgolette
                    const colonne = righe[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || righe[i].split(',');
                    
                    const serieOriginale = colonne[0]?.replace(/"/g, "").trim();
                    const numero = colonne[1]?.replace(/"/g, "").trim();
                    const titolo = colonne[2]?.replace(/"/g, "").trim();
                    const img = colonne[6]?.replace(/"/g, "").trim(); // Colonna G

                    if (serieOriginale === serieTarget) {
                        contatore++;
                        container.innerHTML += `
                            <div class="comic-card rounded-lg overflow-hidden flex flex-col shadow-xl">
                                <div class="aspect-[2/3] bg-slate-800 overflow-hidden">
                                    <img src="${img}" 
                                         class="w-full h-full object-cover" 
                                         onerror="this.src='https://via.placeholder.com/300x450/1e293b/38bdf8?text=N.+${numero}';">
                                </div>
                                <div class="p-3 bg-slate-900/80 flex-grow">
                                    <p class="text-sky-500 text-[10px] font-bold uppercase tracking-widest">N. ${numero}</p>
                                    <h3 class="serif-title text-lg leading-tight text-white">${titolo}</h3>
                                </div>
                            </div>
                        `;
                    }
                }

                if (contatore === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-10">Nessun fumetto trovato per la serie: ${serieTarget}</div>`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('lista-fumetti').innerHTML = "Errore nel caricamento del database.";
            }
        }

        caricaDati();
    </script>
</body>
</html>
