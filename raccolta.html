<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safarà | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .comic-row { transition: all 0.3s ease; background: #111827; border: 1px solid #1e293b; }
        .comic-row:hover { border-color: #38bdf8; background: #161e2d; transform: translateX(8px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-5xl mx-auto mb-12 border-b border-slate-800 pb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
            <a href="index.html" class="text-sky-500 hover:text-sky-400 font-bold tracking-widest text-[10px] uppercase transition-colors">← Torna alla Home</a>
            <h1 id="titolo-serie" class="serif-title text-5xl md:text-7xl text-white mt-4 italic uppercase tracking-tighter">Caricamento...</h1>
        </div>
        
        <div id="btn-serie-generale"></div>
    </header>

    <main id="lista-fumetti" class="max-w-5xl mx-auto space-y-4">
        <div class="text-center py-20 text-slate-500 serif-title text-2xl animate-pulse italic">Apertura registri...</div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv";

        // Mappa dei link alle serie generali (Aggiungi qui gli altri se necessario)
        const linksGenerali = {
            "dyd": "https://www.comics.org/series/3211/",
            "dyd-rist": "https://www.comics.org/series/23117/",
            "diab": "https://www.comics.org/series/10712/",
            "brendon": "https://www.comics.org/series/20121/",
            "simpsons": "https://www.comics.org/series/3211/"
        };

        // Mappa per i nomi "belli" da visualizzare al posto delle sigle
        const nomiPuliti = {
            "dyd": "Dylan Dog",
            "dyd-rist": "Dylan Dog Ristampa",
            "dyd-book": "Dylan Dog Book",
            "dyd-super": "Dylan Dog Super Book",
            "dyd-gig": "Dylan Dog Gigante",
            "diab": "Diabolik",
            "brendon": "Brendon",
            "simpsons": "I Simpsons"
        };

        function splitCsvLine(line) {
            const parts = [];
            let currentPart = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) {
                    parts.push(currentPart.trim());
                    currentPart = '';
                } else { currentPart += char; }
            }
            parts.push(currentPart.trim());
            return parts;
        }

        async function caricaDati() {
            const params = new URLSearchParams(window.location.search);
            const serieTarget = params.get('serie')?.toLowerCase();
            
            // 1. Imposta il Titolo Pulito e il Tasto Generale
            if (serieTarget) {
                document.getElementById('titolo-serie').innerText = nomiPuliti[serieTarget] || serieTarget.toUpperCase();
                
                if (linksGenerali[serieTarget]) {
                    document.getElementById('btn-serie-generale').innerHTML = `
                        <a href="${linksGenerali[serieTarget]}" target="_blank" class="inline-block border border-sky-500/40 text-sky-400 px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-sky-500 hover:text-white transition-all">
                            Scheda Serie Generale ↗
                        </a>
                    `;
                }
            }

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const righe = data.split(/\r?\n/).filter(line => line.trim().length > 0);
                const container = document.getElementById('lista-fumetti');
                
                let html = "";
                let trovati = 0;

                for (let i = 1; i < righe.length; i++) {
                    const colonne = splitCsvLine(righe[i]);
                    const serieFoglio = colonne[0]?.toLowerCase();
                    const numero = colonne[1];
                    const titolo = colonne[2]?.replace(/^"|"$/g, '') || "Senza Titolo";
                    const posseduto = colonne[3]?.toLowerCase().trim();
                    const prezzo = colonne[4] || "---";
                    const condizione = colonne[5] || "---";

                    const urlRicerca = `https://www.comics.org/search/advanced/process/?target=issue&title=${encodeURIComponent(titolo)}`;

                    if (serieFoglio === serieTarget && (posseduto === "si" || posseduto === "sì" || posseduto === "x")) {
                        trovati++;
                        html += `
                            <div class="comic-row p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                                <div class="flex-grow">
                                    <div class="flex items-center gap-4 mb-2">
                                        <span class="bg-sky-500/10 text-sky-500 text-[10px] font-black px-3 py-1 rounded-full border border-sky-500/20 uppercase tracking-widest">Albo N. ${numero}</span>
                                        <span class="text-slate-500 text-[10px] uppercase font-bold tracking-widest italic">${condizione}</span>
                                    </div>
                                    <h3 class="serif-title text-3xl md:text-4xl text-white font-bold leading-tight italic">${titolo}</h3>
                                    <p class="text-slate-500 text-[10px] mt-2 uppercase tracking-widest font-bold">Valore: <span class="text-white">${prezzo}</span></p>
                                </div>
                                <div class="w-full md:w-auto">
                                    <a href="${urlRicerca}" target="_blank" class="inline-block w-full md:w-auto px-8 py-3 bg-slate-900 text-slate-300 border border-slate-700 rounded-xl text-[9px] font-bold uppercase tracking-[0.2em] hover:border-sky-500 hover:text-sky-400 transition-all text-center">
                                        Cerca Scheda ↗
                                    </a>
                                </div>
                            </div>
                        `;
                    }
                }

                container.innerHTML = trovati > 0 ? html : `<div class="text-center py-20 text-slate-500 serif-title text-2xl italic">Nessun albo catalogato.</div>`;

            } catch (err) {
                container.innerHTML = "<p class='text-center text-red-400'>Errore di caricamento.</p>";
            }
        }
        caricaDati();
    </script>
</body>
</html>
