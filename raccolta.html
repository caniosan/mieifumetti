<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Registro Collezione</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .comic-row { 
            transition: all 0.3s ease; 
            background: #111827; 
            border: 1px solid #1e293b; 
        }
        .comic-row:hover { 
            border-color: #38bdf8; 
            background: #161e2d; 
            transform: translateX(8px); 
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-5xl mx-auto mb-12 border-b border-slate-800 pb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
            <a href="index.html" class="text-sky-500 hover:text-sky-400 font-bold tracking-widest text-[10px] uppercase transition-colors">← Torna all'Archivio Centrale</a>
            <h1 id="titolo-serie" class="serif-title text-5xl md:text-7xl text-white mt-4 italic uppercase tracking-tighter shadow-sky-500/20">Registro</h1>
        </div>
        <div id="info-settore" class="text-right hidden md:block">
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mb-1">Settore Catalogo</p>
            <p class="serif-title text-xl italic text-sky-500">Safarà Antichità</p>
        </div>
    </header>

    <main id="lista-fumetti" class="max-w-5xl mx-auto space-y-4">
        <div class="text-center py-20 text-slate-500 serif-title text-2xl animate-pulse italic">
            Consultando i volumi in archivio...
        </div>
    </main>

    <script>
        // URL del tuo Google Sheets (pubblicato come CSV)
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv";

        // Parser per gestire correttamente le virgole nei titoli
        function splitCsvLine(line) {
            const parts = [];
            let currentPart = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) {
                    parts.push(currentPart.trim());
                    currentPart = '';
                } else { currentPart += char; }
            }
            parts.push(currentPart.trim());
            return parts;
        }

        async function caricaDati() {
            const params = new URLSearchParams(window.location.search);
            const serieTarget = params.get('serie')?.toLowerCase();
            
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Dividiamo per righe, ignorando quelle vuote
                const righe = data.split(/\r?\n/).filter(line => line.trim().length > 0);
                const container = document.getElementById('lista-fumetti');
                
                let html = "";
                let trovati = 0;

                // Partiamo da 1 per saltare l'intestazione
                for (let i = 1; i < righe.length; i++) {
                    const colonne = splitCsvLine(righe[i]);
                    
                    const serieFoglio = colonne[0]?.toLowerCase(); // A: ID Serie
                    const numero = colonne[1];                   // B: Numero
                    const titolo = colonne[2]?.replace(/^"|"$/g, '') || "Senza Titolo"; // C: Titolo
                    const posseduto = colonne[3]?.toLowerCase().trim(); // D: Posseduto
                    const prezzo = colonne[4] || "---";          // E: Valore
                    const condizione = colonne[5] || "---";      // F: Stato
                    const linkDinamico = colonne[7] || "#";      // H: Link Ricerca

                    // Filtriamo per Serie e per "Posseduto" (si/sì/x)
                    if (serieFoglio === serieTarget && (posseduto === "si" || posseduto === "sì" || posseduto === "x")) {
                        trovati++;
                        html += `
                            <div class="comic-row p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                                <div class="flex-grow">
                                    <div class="flex items-center gap-4 mb-2">
                                        <span class="bg-sky-500/10 text-sky-500 text-[10px] font-black px-3 py-1 rounded-full border border-sky-500/20 uppercase tracking-widest">Albo N. ${numero}</span>
                                        <div class="h-1 w-1 bg-slate-700 rounded-full"></div>
                                        <span class="text-slate-500 text-[10px] uppercase font-bold tracking-widest italic">${condizione}</span>
                                    </div>
                                    <h3 class="serif-title text-3xl md:text-4xl text-white font-bold leading-tight italic">${titolo}</h3>
                                    <div class="mt-2 flex items-center gap-2">
                                        <span class="text-slate-600 text-[9px] uppercase font-black tracking-tighter">Valore stimato:</span>
                                        <span class="text-white text-sm font-bold">${prezzo}</span>
                                    </div>
                                </div>
                                
                                <div class="w-full md:w-auto">
                                    <a href="${linkDinamico}" target="_blank" class="inline-block w-full md:w-auto px-10 py-4 bg-slate-900 text-slate-300 border border-slate-700 rounded-xl text-[10px] font-bold uppercase tracking-[0.2em] hover:border-sky-500 hover:text-sky-400 hover:shadow-[0_0_15px_rgba(56,189,248,0.2)] transition-all text-center">
                                        Dettagli Albo ↗
                                    </a>
                                </div>
                            </div>
                        `;
                    }
                }

                // Se non troviamo fumetti per quella serie
                if (trovati === 0) {
                    container.innerHTML = `
                        <div class="text-center py-24 border-2 border-dashed border-slate-800 rounded-3xl">
                            <p class="text-slate-600 italic serif-title text-3xl mb-2">Registro ancora vuoto</p>
                            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Non sono stati ancora catalogati volumi posseduti per questa serie.</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = html;
                }

                // Aggiorna il titolo della pagina con il nome della serie
                if(serieTarget) {
                    document.getElementById('titolo-serie').innerText = serieTarget.replace(/-/g, ' ');
                }

            } catch (err) {
                console.error("Errore Caricamento:", err);
                container.innerHTML = "<div class='text-center py-20 text-red-400 font-bold uppercase text-xs tracking-widest'>Errore di sincronizzazione con il Foglio Google.</div>";
            }
        }

        caricaDati();
    </script>
</body>
</html>
