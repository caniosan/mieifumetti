<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .table-row { border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .table-row:hover { background: rgba(56, 189, 248, 0.03); }
        .status-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; color: #38bdf8; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto mb-12">
        <a href="index.html" class="text-sky-500 text-xs font-bold uppercase tracking-[0.3em] hover:text-white transition-colors">← Torna all'Archivio</a>
        
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mt-6">
            <h1 id="serie-title" class="serif-title text-5xl md:text-6xl text-white italic">Caricamento...</h1>
            <div id="external-link-container"></div>
        </div>

        <div class="h-px w-full bg-slate-800 mt-6"></div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr id="table-header-row" class="text-slate-500 text-[10px] uppercase tracking-[0.2em] border-b border-slate-800">
                        <th class="py-4 px-2">N°</th>
                        <th class="py-4 px-2">Titolo Albo</th>
                        <th class="py-4 px-2">Stato</th>
                        <th class="py-4 px-2">Prezzo</th>
                        <th class="py-4 px-2">Condizione</th>
                        </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        const CSV_LINKS = {
            "dyd": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=0&single=true&output=csv",
            "dyd-rist": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1422213309&single=true&output=csv",
            "dyd-book": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=530551093&single=true&output=csv",
            "dyd-super": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=319434338&single=true&output=csv",
            "dyd-gig": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1112494760&single=true&output=csv",
            "diab": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=2012731827&single=true&output=csv",
            "diab-sw": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1343200500&single=true&output=csv",
            "diab-ann": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=807354185&single=true&output=csv",
            "brendon": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=818594743&single=true&output=csv",
            "simpsons": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=798655827&single=true&output=csv",
            "banco-unici": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=922417261&single=true&output=csv"
        };

        const nomiSerie = {
            "dyd": "Dylan Dog", "dyd-rist": "Dylan Dog Ristampa", "dyd-book": "Dylan Dog Collezione Book",
            "dyd-super": "Dylan Dog Super Book", "dyd-gig": "Dylan Dog Albo Gigante",
            "diab": "Diabolik", "diab-sw": "Diabolik Swiisss (Seconda Ristampa)", "diab-ann": "Diabolik Annate",
            "brendon": "Brendon", "simpsons": "Simpsons Panini Comics",
            "banco-unici": "Il Banco degli Unici"
        };

        const COMICS_ORG_LINKS = {
            "dyd": "https://www.comics.org/series/3211/",
            "dyd-rist": "https://www.comics.org/series/102898/",
            "dyd-book": "https://www.comics.org/series/86765/",
            "dyd-super": "https://www.comics.org/series/79808/",
            "dyd-gig": "https://www.comics.org/series/79809/",
            "diab": "https://www.comics.org/series/18176/",
            "diab-sw": "https://www.comics.org/series/31125/",
            "diab-ann": "https://www.comics.org/series/18176/",
            "brendon": "https://www.comics.org/series/6049/",
            "simpsons": "https://www.comicsbox.it/serie/ISPNMN"
        };

        function cleanText(text) {
            if (!text) return "---";
            return text.replace(/^["']|["']$/g, "").replace(/""/g, '"').replace(/[\u2018\u2019]/g, "'").trim();
        }

        const params = new URLSearchParams(window.location.search);
        const serieId = params.get('serie');

        if (serieId && CSV_LINKS[serieId]) {
            document.getElementById('serie-title').innerText = nomiSerie[serieId];

            // Aggiunta testata Link se è il Banco degli Unici
            if (serieId === "banco-unici") {
                const headerRow = document.getElementById('table-header-row');
                const th = document.createElement('th');
                th.className = "py-4 px-2";
                th.innerText = "LINK";
                headerRow.appendChild(th);
            }

            // Inserimento dinamico del tasto catalogo generale (se esiste)
            if (COMICS_ORG_LINKS[serieId]) {
                document.getElementById('external-link-container').innerHTML = `
                    <a href="${COMICS_ORG_LINKS[serieId]}" target="_blank" 
                       class="inline-flex items-center px-4 py-2 border border-slate-700 rounded-lg text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:border-sky-500 hover:text-sky-400 transition-all bg-slate-900/40">
                        Catalogo Generale ↗
                    </a>
                `;
            }

            fetch(CSV_LINKS[serieId])
                .then(res => res.text())
                .then(data => {
                    const rows = data.split(/\r?\n/).slice(1);
                    const tbody = document.getElementById('table-body');
                    
                    rows.forEach(row => {
                        const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        
                        let num, tit, poss, prezzo, cond, link;

                        if (serieId === "banco-unici") {
                            // Struttura: serie(0), raccolta(1), numero(2), titolo(3), posseduto(4), prezzo(5), condizione(6), link(7)
                            num = col[2];
                            tit = col[3];
                            poss = col[4]?.toLowerCase().trim().replace(/["']/g, "");
                            prezzo = col[5] || '-';
                            cond = col[6];
                            link = col[7]?.replace(/["']/g, "").trim();
                        } else {
                            // Struttura standard: raccolta(0), numero(1), titolo(2), posseduto(3), prezzo(4), condizione(5)
                            num = col[1];
                            tit = col[2];
                            poss = col[3]?.toLowerCase().trim().replace(/["']/g, "");
                            prezzo = col[4] || '-';
                            cond = col[5];
                        }

                        if (poss === "si" || poss === "sì" || poss === "x") {
                            const tr = document.createElement('tr');
                            tr.className = 'table-row';
                            
                            let htmlContent = `
                                <td class="py-4 px-2 font-mono text-sky-500 text-sm">${num}</td>
                                <td class="py-4 px-2 serif-title text-white text-lg">${cleanText(tit)}</td>
                                <td class="py-4 px-2"><span class="status-badge">Posseduto</span></td>
                                <td class="py-4 px-2 text-slate-400 font-mono text-sm">${prezzo}</td>
                                <td class="py-4 px-2 text-slate-400 italic text-sm">${cleanText(cond)}</td>
                            `;

                            // Aggiunge la cella del tasto Link solo per il Banco degli Unici
                            if (serieId === "banco-unici") {
                                const linkHtml = link ? `
                                    <td class="py-4 px-2">
                                        <a href="${link}" target="_blank" class="px-3 py-1 border border-sky-500/50 rounded text-[9px] font-bold text-sky-400 hover:bg-sky-500 hover:text-white transition-all uppercase tracking-tighter">
                                            Info ↗
                                        </a>
                                    </td>` : `<td class="py-4 px-2 text-slate-600 text-[9px]">---</td>`;
                                htmlContent += linkHtml;
                            }

                            tr.innerHTML = htmlContent;
                            tbody.appendChild(tr);
                        }
                    });
                });
        }
    </script>
</body>
</html>
