<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safarà | Registro Collezione</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .comic-row { 
            background: #111827; 
            border-left: 3px solid #1e293b;
            transition: all 0.2s ease;
        }
        .comic-row:hover { 
            border-left-color: #38bdf8; 
            background: #161e2d; 
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-4xl mx-auto mb-16 border-b border-slate-800 pb-10 text-center">
        <a href="index.html" class="text-sky-500 hover:text-sky-400 font-bold tracking-[0.3em] text-[10px] uppercase transition-colors">← Torna all'Archivio</a>
        
        <h1 id="titolo-serie" class="serif-title text-6xl md:text-8xl text-white mt-6 italic uppercase tracking-tighter italic">Catalogo</h1>
        
        <div id="btn-serie-generale" class="mt-6"></div>
        
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.5em] mt-8">Inventario Ufficiale Safarà</p>
    </header>

    <main id="lista-fumetti" class="max-w-3xl mx-auto space-y-3">
        <div class="text-center py-20 text-slate-600 serif-title text-2xl animate-pulse italic">
            Sincronizzando i volumi...
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv";

        const dizionarioNomi = {
            "dyd": "Dylan Dog",
            "dyd-rist": "Dylan Dog Ristampa",
            "dyd-book": "Dylan Dog Book",
            "diab": "Diabolik",
            "brendon": "Brendon",
            "simpsons": "I Simpsons"
        };

        // Link fissi alle serie generali su Comics.org
        const linksSerieGenerali = {
            "dyd": "https://www.comics.org/series/3211/",
            "dyd-rist": "https://www.comics.org/series/23117/",
            "diab": "https://www.comics.org/series/10712/",
            "brendon": "https://www.comics.org/series/20121/",
            "simpsons": "https://www.comics.org/series/3211/"
        };

        function splitCsvLine(line) {
            const parts = [];
            let currentPart = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) {
                    parts.push(currentPart.trim());
                    currentPart = '';
                } else { currentPart += char; }
            }
            parts.push(currentPart.trim());
            return parts;
        }

        async function caricaDati() {
            const params = new URLSearchParams(window.location.search);
            const serieTarget = params.get('serie')?.toLowerCase().trim();
            
            if (serieTarget) {
                document.getElementById('titolo-serie').innerText = dizionarioNomi[serieTarget] || serieTarget.toUpperCase();
                
                // Inserisce il pulsante della serie se esiste il link
                if (linksSerieGenerali[serieTarget]) {
                    document.getElementById('btn-serie-generale').innerHTML = `
                        <a href="${linksSerieGenerali[serieTarget]}" target="_blank" class="inline-block border border-sky-500/30 text-sky-400 px-8 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-sky-500 hover:text-white transition-all shadow-[0_0_15px_rgba(56,189,248,0.1)]">
                            Scheda Serie Generale ↗
                        </a>
                    `;
                }
            }

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const righe = data.split(/\r?\n/).filter(line => line.trim().length > 0);
                const container = document.getElementById('lista-fumetti');
                
                let html = "";
                let trovati = 0;

                for (let i = 1; i < righe.length; i++) {
                    const colonne = splitCsvLine(righe[i]);
                    const serieFoglio = colonne[0]?.toLowerCase().replace(/^"|"$/g, '').trim();
                    const numero = colonne[1];
                    const titolo = colonne[2]?.replace(/^"|"$/g, '').trim() || "Senza Titolo";
                    const posseduto = colonne[3]?.toLowerCase().replace(/^"|"$/g, '').trim();

                    if (serieFoglio === serieTarget && (posseduto === "si" || posseduto === "sì" || posseduto === "x")) {
                        trovati++;
                        html += `
                            <div class="comic-row p-5 flex justify-between items-center group">
                                <div class="flex items-baseline gap-6">
                                    <span class="text-sky-500 font-black text-xs w-8 tracking-tighter">#${numero}</span>
                                    <h3 class="serif-title text-2xl md:text-3xl text-slate-200 group-hover:text-white transition-colors leading-none tracking-tight italic">${titolo}</h3>
                                </div>
                                <div class="hidden md:block">
                                    <span class="text-[9px] text-slate-600 font-bold uppercase tracking-[0.2em]">Archiviato</span>
                                </div>
                            </div>
                        `;
                    }
                }

                container.innerHTML = trovati > 0 ? html : `<div class="text-center py-24 text-slate-500 serif-title text-2xl italic">Nessun volume trovato per ${serieTarget}.</div>`;

            } catch (err) {
                container.innerHTML = "<div class='text-center py-20 text-red-400 uppercase text-[10px] font-bold tracking-widest'>Errore di sincronizzazione dati.</div>";
            }
        }

        caricaDati();
    </script>
</body>
</html>
