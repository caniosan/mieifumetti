<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Archivio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .comic-card { transition: all 0.3s ease; background: #111827; border: 1px solid #1e293b; }
        .comic-card:hover { transform: scale(1.02); border-color: #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="max-w-7xl mx-auto mb-10">
        <a href="index.html" class="text-sky-500 hover:text-sky-400 font-bold tracking-widest text-xs uppercase">← Torna alla Home</a>
        <h1 id="titolo-serie" class="serif-title text-5xl md:text-6xl text-white mt-4 italic">Caricamento...</h1>
    </header>

    <main id="lista-fumetti" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
        </main>

    <script>
        // 1. CONFIGURAZIONE - Sostituisci questo ID con quello del tuo script o CSV
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv";

        async function caricaDati() {
            const params = new URLSearchParams(window.location.search);
            const serieId = params.get('serie');
            document.getElementById('titolo-serie').innerText = serieId.toUpperCase().replace(/-/g, ' ');

            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const righe = data.split('\n').slice(1); // Salta l'intestazione

                const container = document.getElementById('lista-fumetti');
                container.innerHTML = "";

                righe.forEach(riga => {
                    const colonne = riga.split(','); 
                    // ASSUMIAMO: Colonna 1: Numero, Colonna 2: Titolo, Colonna 6: Link Immagine
                    const numero = colonne[1];
                    const titolo = colonne[2];
                    const img = colonne[6] ? colonne[6].trim() : "";

                    if(numero) {
                        container.innerHTML += `
                            <div class="comic-card rounded-lg overflow-hidden shadow-2xl">
                                <img src="${img}" alt="N.${numero}" class="w-full h-72 object-cover bg-slate-800" onerror="this.src='https://via.placeholder.com/300x400?text=Copertina+Non+Disponibile'">
                                <div class="p-3">
                                    <p class="text-sky-500 text-[10px] font-bold uppercase">Numero ${numero}</p>
                                    <h3 class="serif-title text-lg leading-tight text-white">${titolo}</h3>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (error) {
                console.error("Errore caricamento:", error);
            }
        }

        caricaDati();
    </script>
</body>
</html>
