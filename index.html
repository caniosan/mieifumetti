<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Collezione Fumetti</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-5">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-sky-400">ARCHIVIO FUMETTI</h1>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </div>

    <script>
        // METTI IL TUO LINK TRA GLI APICI QUI SOTTO
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?output=csv';

        async function data() {
            const r = await fetch(url);
            const text = await r.text();
            const rows = text.split('\n').slice(1); // Salta la prima riga
            
            const html = rows.map(row => {
                const col = row.split(',');
                if (col.length < 4 || !col[3]) return ''; // Salta se non hai messo "si" in POSSEDUTO
                
                return `
                <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden p-2">
                    <img src="${col[6] || 'https://via.placeholder.com/150x200'}" class="w-full h-48 object-cover rounded">
                    <div class="mt-2 text-xs font-bold text-sky-500 uppercase">${col[0]}</div>
                    <div class="font-bold text-sm">#${col[1]} - ${col[2]}</div>
                    <div class="text-green-500 font-bold mt-1">${col[4] > 0 ? '€'+col[4] : 'In Collezione'}</div>
                </div>`;
            }).join('');
            
            document.getElementById('grid').innerHTML = html;
        }
        data();
    </script>
</body>
</html>
