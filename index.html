<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Archivio Fumetti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .collection-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #1e293b; 
            background: #111827; 
            border-radius: 1rem;
        }
        .collection-card:hover { 
            transform: translateY(-5px); 
            border-color: #38bdf8; 
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2);
        }
        #search-input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto text-center mb-16">
        <h1 class="serif-title text-6xl md:text-8xl font-light italic tracking-widest text-white mb-2 uppercase">Safarà</h1>
        <p class="text-sky-500 uppercase tracking-[0.4em] text-[10px] font-bold mb-8">Antichità • Curiosità • Fumetti</p>

        <div class="flex justify-center mb-10">
            <img src="logo.png" alt="Safarà" class="w-full max-w-xl h-64 object-cover rounded-2xl border border-slate-800 shadow-2xl">
        </div>

        <div class="mt-8 flex flex-col items-center gap-6">
            <a href="statistiche.html" class="inline-flex items-center gap-3 px-8 py-3 border border-sky-500/30 rounded-full bg-sky-500/5 text-sky-400 hover:bg-sky-500 hover:text-white transition-all group">
                <span class="text-xs font-bold uppercase tracking-[0.3em]">Statistiche Collezione</span>
                <span class="text-xl">📊</span>
            </a>

            <div class="relative w-full max-w-lg">
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="Cerca tra gli albi posseduti..." 
                    class="w-full bg-[#0f172a] border border-slate-800 text-slate-200 text-sm rounded-full px-6 py-4 pl-12 transition-all">
                <div id="search-status" class="absolute -bottom-6 right-4 text-[9px] uppercase tracking-widest text-slate-600 font-bold"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-raccolte"></main>

    <script>
        const raccolte = [
            { id: "dyd", nome: "Dylan Dog" },
            { id: "dyd-rist", nome: "Dylan Dog Ristampa" },
            { id: "dyd-book", nome: "Dylan Dog Collezione Book" },
            { id: "dyd-super", nome: "Dylan Dog Super Book" },
            { id: "dyd-gig", nome: "Dylan Dog Albo Gigante" },
            { id: "diab", nome: "Diabolik" },
            { id: "diab-r", nome: "Diabolik (R)" },
            { id: "diab-sw", nome: "Diabolik Swiisss (Seconda Ristampa)" },
            { id: "brendon", nome: "Brendon" },
            { id: "simpsons", nome: "Simpsons Panini Comics" },
            { id: "banco-unici", nome: "Il Banco degli Unici" }
        ];

        const CSV_LINKS = {
            "dyd": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=0&single=true&output=csv",
            "dyd-rist": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1422213309&single=true&output=csv",
            "dyd-book": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=530551093&single=true&output=csv",
            "dyd-super": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=319434338&single=true&output=csv",
            "dyd-gig": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1112494760&single=true&output=csv",
            "diab": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=807354185&single=true&output=csv",
            "diab-r": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=2012731827&single=true&output=csv",
            "diab-sw": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1343200500&single=true&output=csv",
            "brendon": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=818594743&single=true&output=csv",
            "simpsons": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=798655827&single=true&output=csv",
            "banco-unici": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=922417261&single=true&output=csv"
        };

        let databaseTitoli = [];
        const menuContainer = document.getElementById('menu-raccolte');
        const searchInput = document.getElementById('search-input');
        const statusLabel = document.getElementById('search-status');

        function cleanText(text) {
            if (!text) return "";
            return text.replace(/^["']|["']$/g, "").replace(/""/g, '"').replace(/[\u2018\u2019]/g, "'").trim();
        }

        async function indicizzaDatabase() {
            statusLabel.innerText = "Sincronizzazione volumi...";
            const fetchPromises = Object.entries(CSV_LINKS).map(async ([id, url]) => {
                try {
                    const response = await fetch(url);
                    const text = await response.text();
                    const righe = text.split(/\r?\n/).slice(1);
                    righe.forEach(riga => {
                        const col = riga.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        
                        // Logica differenziata basata sull'ID della raccolta
                        let num, tit, poss;
                        
                        if (id === "banco-unici") {
                            // Foglio Banco Unici: A:serie, B:raccolta, C:numero, D:titolo, E:posseduto
                            num = col[2];
                            tit = col[3];
                            poss = col[4]?.toLowerCase().trim().replace(/["']/g, "");
                        } else {
                            // Altri Fogli: A:raccolta, B:numero, C:titolo, D:posseduto
                            num = col[1];
                            tit = col[2];
                            poss = col[3]?.toLowerCase().trim().replace(/["']/g, "");
                        }

                        if ((poss === "si" || poss === "sì" || poss === "x") && tit) {
                            databaseTitoli.push({
                                sId: id,
                                sNome: raccolte.find(r => r.id === id).nome,
                                num: num,
                                tit: cleanText(tit)
                            });
                        }
                    });
                } catch (e) { console.error(e); }
            });
            await Promise.all(fetchPromises);
            statusLabel.innerText = `${databaseTitoli.length} Albi in Archivio`;
        }

        function render(query = "") {
            if (query.length < 2) {
                menuContainer.innerHTML = raccolte.map(r => `
                    <a href="raccolta.html?serie=${r.id}" class="collection-card p-8 flex flex-col justify-between h-48 group">
                        <h2 class="serif-title text-2xl font-bold uppercase tracking-tight group-hover:text-sky-400 transition-colors">${r.nome}</h2>
                        <div class="flex justify-between items-center mt-4 text-slate-500 group-hover:text-sky-500">
                            <span class="text-[9px] font-bold tracking-[0.2em] uppercase">Apri Registro</span>
                            <span class="text-xl group-hover:translate-x-2 transition-transform">→</span>
                        </div>
                    </a>
                `).join('');
                return;
            }
            const risultati = databaseTitoli.filter(item => 
                item.tit.toLowerCase().includes(query.toLowerCase()) || 
                item.num.toString() === query.trim()
            ).slice(0, 24);

            if (risultati.length === 0) {
                menuContainer.innerHTML = `<p class="col-span-full text-center text-slate-600 italic py-10 serif-title text-xl">Nessun volume trovato.</p>`;
                return;
            }
            menuContainer.innerHTML = risultati.map(r => `
                <a href="raccolta.html?serie=${r.sId}" class="collection-card p-6 flex flex-col justify-center h-32 group border-sky-900/20">
                    <span class="text-[9px] text-sky-500 font-bold uppercase tracking-[0.2em] mb-1">${r.sNome} #${r.num}</span>
                    <h2 class="serif-title text-lg md:text-xl font-bold text-white group-hover:text-sky-400 transition-colors">${r.tit}</h2>
                </a>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();
        indicizzaDatabase();
    </script>
</body>
</html>
