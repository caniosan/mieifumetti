<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Fumetti | Caniosan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-sans-serif, system-ui; }
        .collection-card { transition: all 0.3s ease; border: 1px solid #1e293b; background: #111827; }
        .collection-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
    </style>
    <meta name="referrer" content="no-referrer">
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto text-center mb-12">
        <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter mb-4">Safarà</h1>
        <div class="h-1 w-20 bg-sky-500 mx-auto mb-4"></div>
        <p class="text-slate-400 uppercase tracking-widest text-xs font-bold">Gestione Collezioni Personali</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-raccolte"></main>

    <script>
        const raccolte = [
            { id: "dyd", nome: "Dylan Dog" },
            { id: "dyd-rist", nome: "Dylan Dog Ristampa" },
            { id: "dyd-book", nome: "Dylan Dog Collezione Book" },
            { id: "dyd-super", nome: "Dylan Dog Super Book" },
            { id: "dyd-gig", nome: "Dylan Dog Albo Gigante" },
            { id: "diab", nome: "Diabolik" },
            { id: "diab-rist", nome: "Diabolik Ristampe" },
            { id: "diab-ann", nome: "Diabolik Annate" },
            { id: "brendon", nome: "Brendon" },
            { id: "simpsons", nome: "Simpsons Panini Comics" }
        ];

        document.getElementById('menu-raccolte').innerHTML = raccolte.map(r => `
            <a href="raccolta.html?serie=${r.id}" class="collection-card p-8 rounded-2xl flex flex-col justify-between h-48 group">
                <h2 class="text-xl font-black uppercase italic group-hover:text-sky-400 transition-colors">${r.nome}</h2>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Visualizza Raccolta</span>
                    <span class="text-sky-500">→</span>
                </div>
            </a>
        `).join('');
    </script>
</body>
</html>
