<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Archivio Fumetti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .collection-card { 
            transition: all 0.3s ease; 
            border: 1px solid #1e293b; 
            background: #111827; 
            border-radius: 1rem;
        }
        .collection-card:hover { 
            transform: translateY(-5px); 
            border-color: #38bdf8; 
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2);
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto text-center mb-16">
        <h1 class="serif-title text-6xl md:text-8xl font-light italic tracking-widest text-white mb-2 uppercase">Safarà</h1>
        <p class="text-sky-500 uppercase tracking-[0.4em] text-[10px] font-bold mb-8">Antichità • Curiosità • Fumetti</p>

        <div class="flex justify-center mb-10">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-sky-600 to-blue-900 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                <img src="logo.png" alt="Safarà Archivio" class="relative w-full max-w-xl h-64 object-cover rounded-2xl border border-slate-800 shadow-2xl sepia-[0.2]">
            </div>
        </div>

        <div class="h-px w-32 bg-slate-800 mx-auto mb-4"></div>
        <p class="serif-title italic text-slate-400 text-lg">"Ogni oggetto ha una storia, ogni fumetto un ricordo."</p>

        <div class="mt-8">
            <a href="statistiche.html" class="inline-flex items-center gap-3 px-8 py-3 border border-sky-500/30 rounded-full bg-sky-500/5 text-sky-400 hover:bg-sky-500 hover:text-white transition-all duration-300 group">
                <span class="text-xs font-bold uppercase tracking-[0.3em]">Statistiche Collezione</span>
                <span class="text-xl group-hover:rotate-12 transition-transform">📊</span>
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-raccolte"></main>

    <script>
        const raccolte = [
            { id: "dyd", nome: "Dylan Dog" },
            { id: "dyd-rist", nome: "Dylan Dog Ristampa" },
            { id: "dyd-book", nome: "Dylan Dog Collezione Book" },
            { id: "dyd-super", nome: "Dylan Dog Super Book" },
            { id: "dyd-gig", nome: "Dylan Dog Albo Gigante" },
            { id: "diab", nome: "Diabolik" },
            { id: "diab-rist", nome: "Diabolik Ristampe" },
            { id: "diab-ann", nome: "Diabolik Annate" },
            { id: "brendon", nome: "Brendon" },
            { id: "simpsons", nome: "Simpsons Panini Comics" }
        ];

        const menuContainer = document.getElementById('menu-raccolte');
        menuContainer.innerHTML = raccolte.map(r => `
            <a href="raccolta.html?serie=${r.id}" class="collection-card p-8 flex flex-col justify-between h-48 group">
                <h2 class="serif-title text-2xl font-bold uppercase tracking-tight group-hover:text-sky-400 transition-colors">${r.nome}</h2>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase">Apri Registro</span>
                    <span class="text-sky-500 text-xl group-hover:translate-x-2 transition-transform">→</span>
                </div>
            </a>
        `).join('');
    </script>
</body>
</html>
