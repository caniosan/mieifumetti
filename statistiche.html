<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Safarà | Analisi Avanzata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        .stat-card { background: #111827; border: 1px solid #1e293b; border-radius: 1rem; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .progress-bar { height: 6px; border-radius: 3px; background: #1e293b; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease-out; }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-6xl mx-auto mb-12 text-center">
        <a href="index.html" class="text-sky-500 text-xs font-bold uppercase tracking-[0.3em] hover:text-white transition-colors">← Torna alla Home</a>
        <h1 class="serif-title text-5xl md:text-6xl text-white mt-6 italic">Analisi Collezione</h1>
        <div id="total-counter" class="text-slate-500 text-sm mt-4 uppercase tracking-widest font-bold">Sincronizzazione dati...</div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="stat-card p-6 text-center">
                <h2 class="serif-title text-2xl text-slate-400 mb-6 uppercase tracking-widest">Ripartizione Totale</h2>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <div class="stat-card p-6 text-center">
                <h2 class="serif-title text-2xl text-slate-400 mb-6 uppercase tracking-widest">Bilanciamento Serie</h2>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <h2 class="serif-title text-3xl text-white mb-8 italic text-center">Dettaglio per Serie</h2>
        <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const CSV_LINKS = {
            "dyd": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=0&single=true&output=csv",
            "dyd-rist": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1422213309&single=true&output=csv",
            "dyd-book": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=530551093&single=true&output=csv",
            "dyd-super": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=319434338&single=true&output=csv",
            "dyd-gig": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1112494760&single=true&output=csv",
            "diab": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=2012731827&single=true&output=csv",
            "diab-rist": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=1343200500&single=true&output=csv",
            "diab-ann": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=807354185&single=true&output=csv",
            "brendon": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=818594743&single=true&output=csv",
            "simpsons": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Lmk8HsGARe1PrhPxbUcAY-YHN-_T8WuSKUQO89-PWO8kvQgB5jzN41khZhZTUJhdtIL-36ax-qIU/pub?gid=798655827&single=true&output=csv"
        };

        const nomiSerie = {
            "dyd": "Dylan Dog", "dyd-rist": "Dylan Dog Ristampa", "dyd-book": "Dylan Dog Book",
            "dyd-super": "Dylan Dog Super Book", "dyd-gig": "Dylan Dog Gigante",
            "diab": "Diabolik", "diab-rist": "Diabolik Ristampa", "diab-ann": "Diabolik Annate",
            "brendon": "Brendon", "simpsons": "Simpsons"
        };

        const coloriPalette = ['#0ea5e9', '#2563eb', '#38bdf8', '#0284c7', '#7dd3fc', '#075985', '#3b82f6', '#1d4ed8', '#60a5fa', '#1e40af'];

        async function init() {
            let totaleGenerale = 0;
            let dati = [];

            const promises = Object.entries(CSV_LINKS).map(async ([id, url]) => {
                try {
                    const res = await fetch(url);
                    const text = await res.text();
                    const righe = text.split(/\r?\n/).slice(1);
                    let n = 0;
                    righe.forEach(r => {
                        const col = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        const p = col[3]?.toLowerCase().trim().replace(/["']/g, "");
                        if (p === "si" || p === "sì" || p === "x") n++;
                    });
                    totaleGenerale += n;
                    dati.push({ nome: nomiSerie[id], val: n });
                } catch (e) { console.error(e); }
            });

            await Promise.all(promises);
            dati.sort((a, b) => b.val - a.val);

            document.getElementById('total-counter').innerText = `Archivio Totale: ${totaleGenerale} Volumi`;

            // GRAFICO DOUGHNUT
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: dati.map(d => d.nome),
                    datasets: [{
                        data: dati.map(d => d.val),
                        backgroundColor: coloriPalette,
                        borderColor: '#0b0f1a',
                        borderWidth: 2
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } } 
                }
            });

            // GRAFICO RADAR
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: dati.map(d => d.nome),
                    datasets: [{
                        label: 'Volumi',
                        data: dati.map(d => d.val),
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderColor: '#38bdf8',
                        pointBackgroundColor: '#38bdf8',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: '#1e293b' },
                            grid: { color: '#1e293b' },
                            pointLabels: { color: '#64748b', font: { size: 10 } },
                            ticks: { display: false }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // DETTAGLIO BARRE
            const container = document.getElementById('stats-container');
            container.innerHTML = dati.map((s, i) => {
                const perc = totaleGenerale > 0 ? (s.val / totaleGenerale * 100).toFixed(1) : 0;
                return `
                    <div class="stat-card p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="serif-title text-lg text-white italic">${s.nome}</span>
                            <span class="text-[10px] font-bold text-slate-500 tracking-tighter">${s.val} VOL.</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${perc}%; background-color: ${coloriPalette[i % coloriPalette.length]}"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
